name: Publish documentation previews

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-pages-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build docs site
        run: mkdocs build --strict

      - name: Prepare Pages payload
        id: prepare
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          sanitize_ref() {
            echo "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#^-##; s#-$##'
          }

          mkdir -p .pages
          cp pages-assets/index.html .pages/index.html
          cp pages-assets/site-directory.css .pages/site-directory.css

          if [ "$EVENT_NAME" = "pull_request" ]; then
            DESTINATION="pulls/pr-$PR_NUMBER"
          else
            SAFE_REF="$(sanitize_ref "$REF_NAME")"
            DESTINATION="branches/$SAFE_REF"
          fi

          mkdir -p ".pages/$DESTINATION"
          cp -R site/. ".pages/$DESTINATION/"

          if [ "$EVENT_NAME" = "push" ] && [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            mkdir -p .pages/latest
            cp -R site/. .pages/latest/
          fi

          PREVIEW_URL="https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/${DESTINATION}/"
          LATEST_URL="https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/latest/"

          {
            echo "destination=$DESTINATION"
            echo "preview_url=$PREVIEW_URL"
            echo "latest_url=$LATEST_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .pages
          keep_files: true
          enable_jekyll: false

      - name: Add or update PR preview comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.prepare.outputs.preview_url }}
          LATEST_URL: ${{ steps.prepare.outputs.latest_url }}
        with:
          script: |
            const marker = '<!-- docs-preview-comment -->';
            const body = [
              marker,
              'Documentation preview is available.',
              '',
              `- PR preview: ${process.env.PREVIEW_URL}`,
              `- Latest main docs: ${process.env.LATEST_URL}`,
              '',
              'Branch and PR previews are only published for branches inside this repository.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
